<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard TRS Agudo — APEX</title>

<style>
.apex-nav{background:#FFF;border-bottom:1px solid #E8E8E8;height:52px;display:flex;align-items:center;padding:0 32px;gap:16px;font-family:'Space Grotesk',system-ui,sans-serif;}
.apex-nav-logo{font-size:12px;font-weight:700;color:#2460A7;letter-spacing:5px;text-transform:uppercase;text-decoration:none;flex-shrink:0;}
.apex-nav-div{width:1px;height:16px;background:#2A2A2A;flex-shrink:0;}
.apex-nav-title{font-size:11px;font-weight:500;color:#999;letter-spacing:1.5px;text-transform:uppercase;}
.apex-nav-space{flex:1;}
.apex-nav-back{font-size:11px;font-weight:600;color:#999;letter-spacing:1px;text-decoration:none;background:none;border:1px solid #2A2A2A;cursor:pointer;font-family:inherit;padding:5px 14px;border-radius:5px;transition:color .2s,border-color .2s;}
.apex-nav-back:hover{color:#2460A7;border-color:rgba(185,148,84,0.3);}
</style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Space Grotesk',system-ui,sans-serif;background:#F5F5F5;color:#111;font-size:15px;}

/* HEADER */
.header{background:#fff;border-bottom:3px solid #2460A7;padding:16px 36px;display:flex;align-items:center;justify-content:space-between;gap:20px;}
.header-left{display:flex;flex-direction:column;gap:2px;}
.header-title{font-size:20px;font-weight:600;color:#1A4070;}
.header-sub{font-size:12px;color:#555;}
.header-logos{display:flex;align-items:center;gap:24px;}
.logo-fenix{display:flex;flex-direction:column;align-items:flex-end;}
.logo-fenix-main{font-size:20px;font-weight:700;color:#2460A7;letter-spacing:.08em;line-height:1;}
.logo-fenix-sub{font-size:9px;letter-spacing:.18em;color:#555;text-transform:uppercase;margin-top:1px;}
.logo-divider{width:1px;height:36px;background:#E8D5B0;}
.logo-hospital{display:flex;flex-direction:column;align-items:flex-start;}
.logo-hospital-main{font-size:13px;font-weight:700;color:#6B4E24;letter-spacing:.04em;line-height:1;}
.logo-hospital-sub{font-size:9px;letter-spacing:.12em;color:#555;text-transform:uppercase;margin-top:2px;}

/* BARRA DE CONTROLES */
.ctrl-bar{background:#fff;padding:10px 36px;border-bottom:1px solid #E8D5B0;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.ctrl-label{font-size:11px;color:#6B4E24;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.ctrl-in{border:1.5px solid #2460A7;border-radius:8px;padding:5px 12px;font-size:13px;color:#1A4070;font-weight:600;background:#F7F0E4;cursor:pointer;outline:none;}
.ctrl-in:focus{border-color:#1A4070;}
.ctrl-btn{background:#1A4070;color:#fff;border:none;border-radius:8px;padding:7px 18px;font-size:11px;font-weight:600;letter-spacing:.04em;cursor:pointer;transition:background .2s;}
.ctrl-btn:hover{background:#2460A7;}
.ctrl-btn-sec{background:transparent;color:#1A4070;border:1.5px solid #2460A7;border-radius:8px;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;}
.ctrl-btn-sec:hover{background:#F7F0E4;}
.ctrl-spacer{flex:1;}

/* CONTEÚDO */
.page{max-width:1200px;margin:0 auto;padding:28px 36px;}
.sem-dados{text-align:center;padding:80px 20px;font-size:18px;font-style:italic;color:#555;}

/* SEÇÕES */
.section{background:#fff;border-radius:14px;padding:20px 26px;border:1px solid #E8D5B0;margin-bottom:18px;}
.sec-title{font-size:13px;font-weight:600;color:#1A4070;text-transform:uppercase;letter-spacing:.06em;margin:0 0 3px;}
.sec-bar{height:2px;background:linear-gradient(90deg,#2460A7,#E8D5B0);margin-bottom:16px;border-radius:1px;}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
.kpi-card{background:#F7F0E4;border-radius:12px;border-left:4px solid #2460A7;padding:14px 18px;}
.kpi-lbl{font-size:10px;color:#6B4E24;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.kpi-val{font-size:38px;font-weight:600;color:#1c1c1e;line-height:1;}
.kpi-val small{font-size:15px;color:#555;font-weight:400;}
.kpi-sub{font-size:11px;color:#555;margin-top:5px;}

/* VELOCÍMETROS */
.gauges-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
.gauge-section{background:#fff;border-radius:14px;border:1px solid #E8D5B0;padding:20px 26px;}
.gauge-sec-title{font-size:13px;font-weight:600;color:#1A4070;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.gauge-sec-bar{height:2px;background:linear-gradient(90deg,#2460A7,#E8D5B0);margin-bottom:16px;border-radius:1px;}
.gauge-inner{display:flex;flex-direction:column;align-items:center;}
.gauge-wrap{position:relative;width:220px;height:120px;}
.gauge-num{font-size:40px;font-weight:700;color:#1c1c1e;text-align:center;margin-top:6px;line-height:1;}
.gauge-mes{font-size:12px;color:#555;text-align:center;margin-top:3px;}
.gauge-faixa-tag{display:inline-block;font-size:11px;font-weight:600;padding:3px 12px;border-radius:20px;margin-top:6px;letter-spacing:.04em;}

/* MODALIDADES */
.mod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.mod-item{background:#F7F0E4;border-radius:10px;padding:14px;text-align:center;border-top:3px solid #2460A7;}
.mod-nome{font-size:10px;font-weight:600;color:#6B4E24;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.mod-val{font-size:34px;font-weight:600;color:#1c1c1e;line-height:1;}
.mod-pct{font-size:11px;color:#555;margin-top:4px;}

/* ACESSOS */
.acess-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.acess-item{background:#F7F0E4;border-radius:10px;padding:14px;text-align:center;border-top:3px solid #2D6A4F;}
.acess-nome{font-size:10px;font-weight:600;color:#2D6A4F;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.acess-val{font-size:34px;font-weight:600;color:#1c1c1e;line-height:1;}

/* INTERCORRÊNCIAS — Layout D com gradiente */
.ic-layout{display:grid;grid-template-columns:1fr 260px;gap:20px;}
.ic-barras{display:flex;flex-direction:column;gap:7px;}
.ic-barra-row{display:grid;grid-template-columns:148px 1fr 58px;gap:8px;align-items:center;}
.ic-barra-nome{font-size:12px;color:#3D2B0E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ic-barra-bg{background:#F0E8DC;border-radius:5px;height:18px;overflow:hidden;}
.ic-barra-fill{height:100%;border-radius:5px;}
.ic-barra-taxa{font-size:10px;font-weight:600;color:#6B4E24;text-align:right;}
.ic-right{display:flex;flex-direction:column;gap:14px;}
.ic-taxa-global{background:linear-gradient(160deg,#F7F0E4,#EDE3D4);border:1px solid #E8D5B0;border-radius:12px;padding:18px;text-align:center;border-top:4px solid #2460A7;}
.ic-taxa-num{font-size:50px;font-weight:700;color:#1A4070;line-height:1;}
.ic-taxa-label{font-size:10px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-top:5px;}
.ic-top3-title{font-size:10px;font-weight:600;color:#6B4E24;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.ic-top3-item{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#F7F0E4;border-radius:10px;border-left:3px solid #ccc;margin-bottom:6px;}
.ic-top3-rank{font-size:13px;font-weight:700;min-width:16px;}
.ic-top3-nome{font-size:11px;color:#3D2B0E;flex:1;line-height:1.3;}
.ic-top3-n{font-size:20px;font-weight:700;color:#1c1c1e;}
.ic-top3-trend{font-size:10px;font-weight:600;display:flex;align-items:center;gap:2px;min-width:36px;justify-content:flex-end;}
.trend-up{color:#A32D2D;}
.trend-down{color:#2D6A4F;}
.trend-eq{color:#555;}
.taxa-legenda{font-size:10px;color:#555;margin-top:8px;text-align:right;}

/* TABELA SEMANAS */
.sem-table{width:100%;border-collapse:collapse;font-size:12px;}
.sem-table th{font-size:10px;font-weight:600;color:#6B4E24;text-transform:uppercase;letter-spacing:.04em;padding:7px 10px;border-bottom:1.5px solid #2460A7;text-align:center;background:#F7F0E4;}
.sem-table th:first-child{text-align:left;border-radius:8px 0 0 0;}
.sem-table td{padding:8px 10px;border-bottom:1px solid #F0E8DC;color:#3D2B0E;text-align:center;}
.sem-table td:first-child{text-align:left;font-weight:600;color:#1A4070;}
.sem-table tr:hover td{background:#FAF5EF;}
.sem-table .col-total{font-weight:700;color:#1A4070;}

@media print{.ctrl-bar{display:none!important;}body{background:#fff;}.page{padding:16px;}.section,.gauge-section,.kpi-card,.mod-item,.acess-item{break-inside:avoid;}-webkit-print-color-adjust:exact;print-color-adjust:exact;}
@media(max-width:800px){.header{padding:14px 20px;flex-wrap:wrap;}.ctrl-bar{padding:10px 20px;}.page{padding:20px 16px;}.kpi-grid{grid-template-columns:1fr 1fr;}.mod-grid{grid-template-columns:1fr 1fr;}.acess-grid{grid-template-columns:1fr 1fr;}.gauges-grid{grid-template-columns:1fr;}.ic-layout{grid-template-columns:1fr;}.ic-barra-row{grid-template-columns:110px 1fr 50px;}}
</style>

<body>

<!-- HEADER COM LOGOS -->
<nav class="apex-nav">
  <a href="portal_profissionais.html" class="apex-nav-logo">APEX</a>
  <div class="apex-nav-div"></div>
  <span class="apex-nav-title" id="header-sub">Dashboard — TRS Agudo</span>
  <div class="apex-nav-space"></div>
  <a href="trs_agudo.html" class="apex-nav-back">← Voltar</a>
</nav>

<!-- CONTROLES -->
<div class="ctrl-bar">
  <span class="ctrl-label">Período</span>
  <input type="month" id="mes-ref" class="ctrl-in"/>
  <button class="ctrl-btn" onclick="gerar()">Gerar dashboard →</button>
  <div class="ctrl-spacer"></div>
  <button class="ctrl-btn-sec" onclick="window.print()">⎙ Exportar PDF</button>
</div>

<div class="page">
  <div id="content">
    <div class="sem-dados">Selecione o período e clique em <strong>Gerar dashboard</strong> para visualizar os indicadores.</div>
  </div>
</div>

<script>
const params=new URLSearchParams(location.search);
const HOSPITAL_ID=params.get('hospital')||'mont_serrat';
const HOSPITAL_NOME=params.get('nome')||'Hospital Mont Serrat';
const STORAGE_KEY=`trs_agudo_${HOSPITAL_ID}`;

document.getElementById('header-sub').textContent=`${HOSPITAL_NOME} · Dashboard TRS Agudo`;
document.title=`Dashboard TRS Agudo — ${HOSPITAL_NOME}`;

function isoWeekToDate(y,w){
  const d=new Date(y,0,1+(w-1)*7);
  const dow=d.getDay();
  if(dow<=4)d.setDate(d.getDate()-d.getDay()+1);
  else d.setDate(d.getDate()+8-d.getDay());
  return d;
}
function formatMes(mes){
  const[a,mm]=mes.split('-');
  const M=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return`${M[parseInt(mm)-1]}/${a}`;
}
function mesAnterior(mes){
  const[a,mm]=mes.split('-');
  let m=parseInt(mm)-1,y=parseInt(a);
  if(m===0){m=12;y--;}
  return`${y}-${String(m).padStart(2,'0')}`;
}
function getSemsDoMes(mes){
  const[ano,mm]=mes.split('-');
  const hist=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
  return hist.filter(h=>{
    if(!h.semana)return false;
    const[y,w]=h.semana.split('-W');
    const d=isoWeekToDate(parseInt(y),parseInt(w));
    return d.getFullYear()===parseInt(ano)&&(d.getMonth()+1)===parseInt(mm);
  });
}
function agregar(sems){
  let totPac=0;
  const totS={hd:0,crrt:0,dp:0,sled:0};
  const totA={fav:0,permcath:0,cdl:0};
  const totIC={};
  const semsComSessao=new Set();
  sems.forEach(s=>{
    totPac+=(s.pac||0);
    Object.keys(totS).forEach(k=>totS[k]+=(s.sessoes[k]||0));
    Object.keys(totA).forEach(k=>totA[k]+=(s.acessos[k]||0));
    s.ic.forEach(ic=>{totIC[ic.nome]=(totIC[ic.nome]||0)+ic.qtd;});
    if(Object.values(s.sessoes).reduce((a,b)=>a+b,0)>0) semsComSessao.add(s.semana);
  });
  const totSess=Object.values(totS).reduce((a,b)=>a+b,0);
  return{totPac,totS,totA,totIC,totSess,diasComSessao:semsComSessao.size};
}

// Velocímetro — faixas de 50
const FAIXAS_LABELS=['0–50','50–100','100–150','150–200','200–250','>250'];
const FAIXAS_CORES=['#555','#2460A7','#2460A7','#E8973A','#C85B2A','#8B1A1A'];
const FAIXAS_BG=['rgba(156,122,74,.15)','rgba(190,150,100,.2)','rgba(212,168,71,.2)','rgba(232,151,58,.2)','rgba(200,91,42,.2)','rgba(139,26,26,.2)'];

function faixaIdx(n){
  if(n>=250)return 5;
  return Math.min(Math.floor(n/50),5);
}

function drawGauge(canvasId, valor){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=220,H=120;
  canvas.width=W;canvas.height=H;
  ctx.clearRect(0,0,W,H);
  const cx=W/2,cy=H-8,R=95,thick=26;
  const arcTotal=Math.PI;
  const arcFx=arcTotal/6;

  // Sombra suave do arco
  FAIXAS_CORES.forEach((_,i)=>{
    const sa=Math.PI+(i*arcFx),ea=Math.PI+((i+1)*arcFx);
    ctx.beginPath();ctx.arc(cx,cy,R+2,sa,ea);ctx.arc(cx,cy,R-thick-2,ea,sa,true);ctx.closePath();
    ctx.fillStyle='rgba(0,0,0,0.08)';ctx.fill();
  });

  // Arcos com gradiente por faixa
  FAIXAS_CORES.forEach((cor,i)=>{
    const sa=Math.PI+(i*arcFx),ea=Math.PI+((i+1)*arcFx);
    ctx.beginPath();ctx.arc(cx,cy,R,sa,ea);ctx.arc(cx,cy,R-thick,ea,sa,true);ctx.closePath();
    ctx.fillStyle=FAIXAS_BG[i];ctx.fill();
    ctx.strokeStyle=cor;ctx.lineWidth=0.5;ctx.stroke();
  });

  // Faixa ativa em destaque
  const fi=faixaIdx(valor);
  const sa2=Math.PI+(fi*arcFx),ea2=Math.PI+((fi+1)*arcFx);
  const grd=ctx.createLinearGradient(cx-R,cy,cx+R,cy);
  grd.addColorStop(0,FAIXAS_CORES[Math.max(0,fi-1)]);
  grd.addColorStop(1,FAIXAS_CORES[Math.min(5,fi+1)]);
  ctx.beginPath();ctx.arc(cx,cy,R,sa2,ea2);ctx.arc(cx,cy,R-thick,ea2,sa2,true);ctx.closePath();
  ctx.fillStyle=FAIXAS_CORES[fi];ctx.globalAlpha=0.9;ctx.fill();ctx.globalAlpha=1;

  // Labels faixas
  FAIXAS_LABELS.forEach((lbl,i)=>{
    const mid=Math.PI+(i*arcFx)+(arcFx/2);
    const lx=cx+(R-thick/2)*Math.cos(mid);
    const ly=cy+(R-thick/2)*Math.sin(mid);
    ctx.font='bold 7.5px Arial';
    ctx.fillStyle=i===fi?'#fff':'rgba(109,78,36,0.7)';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(lbl,lx,ly);
  });

  // Agulha
  const frac=fi<5?(valor-fi*50)/50:1;
  const angle=Math.PI+(fi+frac)*arcFx;
  const nLen=R-thick-10;
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.3)';ctx.shadowBlur=4;
  ctx.strokeStyle=FAIXAS_CORES[fi];ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+nLen*Math.cos(angle),cy+nLen*Math.sin(angle));ctx.stroke();
  ctx.restore();
  ctx.beginPath();ctx.arc(cx,cy,7,0,2*Math.PI);
  ctx.fillStyle=FAIXAS_CORES[fi];ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,3,0,2*Math.PI);
  ctx.fillStyle='#fff';ctx.fill();
}

// Gradiente para barras de intercorrência
function icGradiente(pct){
  // Verde → Amarelo → Laranja → Vermelho conforme proximidade do topo
  if(pct>80)return'#C85B2A';
  if(pct>60)return'#E8973A';
  if(pct>40)return'#2460A7';
  if(pct>20)return'#9CB84E';
  return'#2D6A4F';
}

function tendHTML(n,ant){
  if(ant==null)return'<span class="trend-eq">—</span>';
  const d=n-ant;
  if(d>0)return`<span class="trend-up">▲ +${d}</span>`;
  if(d<0)return`<span class="trend-down">▼ ${d}</span>`;
  return'<span class="trend-eq">= 0</span>';
}

function top3Border(i){
  return['#C85B2A','#2460A7','#2D6A4F'][i];
}

function diasNoMes(mes){const[a,mm]=mes.split('-');return new Date(parseInt(a),parseInt(mm),0).getDate();}
function pct(v,t){return t>0?Math.round(v/t*100)+'%':'0%';}
function taxa(v,t){return t>0?(v/t*100).toFixed(1):'-';}

function gerar(){
  const mes=document.getElementById('mes-ref').value;
  if(!mes){alert('Selecione o período');return;}

  const sems=getSemsDoMes(mes);
  const mesAnt=mesAnterior(mes);
  const semsAnt=getSemsDoMes(mesAnt);

  if(sems.length===0){
    document.getElementById('content').innerHTML=`<div class="sem-dados">Nenhum dado para ${formatMes(mes)}. <a href="trs_agudo_admin.html?hospital=${HOSPITAL_ID}&nome=${encodeURIComponent(HOSPITAL_NOME)}" style="color:#1A4070;">→ Ir para lançamento</a></div>`;
    return;
  }

  const ag=agregar(sems);
  const agAnt=semsAnt.length>0?agregar(semsAnt):null;
  const {totPac,totS,totA,totIC,totSess,diasComSessao}=ag;
  const totSessAnt=agAnt?agAnt.totSess:0;
  const totICval=Object.values(totIC).reduce((a,b)=>a+b,0);
  const icAntMap=agAnt?agAnt.totIC:{};

  const mediaSessPac=totPac>0?(totSess/totPac).toFixed(1):'-';
  const mediaSessDia=totSess>0?(totSess/diasNoMes(mes)).toFixed(1):'-';
  const taxaGlobal=taxa(totICval,totSess);
  const icList=Object.entries(totIC).sort((a,b)=>b[1]-a[1]);
  const maxIC=icList.length>0?icList[0][1]:1;
  const fi=faixaIdx(totSess);
  const fiAnt=faixaIdx(totSessAnt);

  document.getElementById('content').innerHTML=`
    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-lbl">Pacientes únicos</div>
        <div class="kpi-val">${totPac}</div>
        <div class="kpi-sub">${sems.length} semanas lançadas</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-lbl">Total de Sessões</div>
        <div class="kpi-val">${totSess}</div>
        <div class="kpi-sub">HD · CRRT · DP · SLED</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-lbl">Sessões / Paciente</div>
        <div class="kpi-val">${mediaSessPac}</div>
        <div class="kpi-sub">média por paciente único</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-lbl">Sessões / Dia</div>
        <div class="kpi-val">${mediaSessDia}</div>
        <div class="kpi-sub">média diária no mês</div>
      </div>
    </div>

    <!-- Velocímetros -->
    <div class="gauges-grid">
      <div class="gauge-section">
        <div class="gauge-sec-title">Sessões — Mês Vigente (acumulado)</div>
        <div class="gauge-sec-bar"></div>
        <div class="gauge-inner">
          <div class="gauge-wrap"><canvas id="gauge-atual"></canvas></div>
          <div class="gauge-num">${totSess}</div>
          <div class="gauge-mes">${formatMes(mes)}</div>
          <span class="gauge-faixa-tag" style="background:${FAIXAS_BG[fi]};color:${FAIXAS_CORES[fi]};border:1px solid ${FAIXAS_CORES[fi]};">Faixa ${FAIXAS_LABELS[fi]}</span>
        </div>
      </div>
      <div class="gauge-section">
        <div class="gauge-sec-title">Sessões — Mês Anterior (fechado)</div>
        <div class="gauge-sec-bar"></div>
        <div class="gauge-inner">
          <div class="gauge-wrap"><canvas id="gauge-ant"></canvas></div>
          <div class="gauge-num">${totSessAnt||'—'}</div>
          <div class="gauge-mes">${formatMes(mesAnt)}</div>
          ${totSessAnt>0?`<span class="gauge-faixa-tag" style="background:${FAIXAS_BG[fiAnt]};color:${FAIXAS_CORES[fiAnt]};border:1px solid ${FAIXAS_CORES[fiAnt]};">Faixa ${FAIXAS_LABELS[fiAnt]}</span>`:'<span class="gauge-faixa-tag" style="background:#F0E8DC;color:#555;">Sem dados</span>'}
        </div>
      </div>
    </div>

    <!-- Sessões por modalidade -->
    <div class="section">
      <div class="sec-title">Sessões por Modalidade — ${formatMes(mes)}</div>
      <div class="sec-bar"></div>
      <div class="mod-grid">
        <div class="mod-item"><div class="mod-nome">HD</div><div class="mod-val">${totS.hd}</div><div class="mod-pct">${pct(totS.hd,totSess)}</div></div>
        <div class="mod-item"><div class="mod-nome">CRRT</div><div class="mod-val">${totS.crrt}</div><div class="mod-pct">${pct(totS.crrt,totSess)}</div></div>
        <div class="mod-item"><div class="mod-nome">DP</div><div class="mod-val">${totS.dp}</div><div class="mod-pct">${pct(totS.dp,totSess)}</div></div>
        <div class="mod-item"><div class="mod-nome">SLED</div><div class="mod-val">${totS.sled}</div><div class="mod-pct">${pct(totS.sled,totSess)}</div></div>
      </div>
    </div>

    <!-- Acessos venosos -->
    <div class="section">
      <div class="sec-title">Acessos Venosos — ${formatMes(mes)}</div>
      <div class="sec-bar"></div>
      <div class="acess-grid">
        <div class="acess-item"><div class="acess-nome">FAV · Fístula</div><div class="acess-val">${totA.fav}</div></div>
        <div class="acess-item"><div class="acess-nome">Permcath</div><div class="acess-val">${totA.permcath}</div></div>
        <div class="acess-item"><div class="acess-nome">CDL · Shilley</div><div class="acess-val">${totA.cdl}</div></div>
      </div>
    </div>

    <!-- Intercorrências -->
    <div class="section">
      <div class="sec-title">Densidade de Intercorrências — ${formatMes(mes)}</div>
      <div class="sec-bar"></div>
      ${icList.length===0
        ?'<p style="font-size:15px;font-style:italic;color:#555;text-align:center;padding:20px;">✓ Nenhuma intercorrência registrada neste período</p>'
        :`<div class="ic-layout">
          <div>
            <div class="ic-barras">
              ${icList.map(([nome,qtd])=>{
                const pctBar=Math.round(qtd/maxIC*100);
                const t=parseFloat(taxa(qtd,totSess));
                const cor=icGradiente(pctBar);
                return`<div class="ic-barra-row">
                  <span class="ic-barra-nome" title="${nome}">${nome}</span>
                  <div class="ic-barra-bg">
                    <div class="ic-barra-fill" style="width:${pctBar}%;background:linear-gradient(90deg,#2D6A4F,${cor});"></div>
                  </div>
                  <span class="ic-barra-taxa" style="color:${cor};">${t}/100</span>
                </div>`;
              }).join('')}
            </div>
            <div class="taxa-legenda">Taxa por 100 sessões · Verde = baixa · Vermelho = alta</div>
          </div>
          <div class="ic-right">
            <div class="ic-taxa-global">
              <div class="ic-taxa-num">${taxaGlobal}</div>
              <div class="ic-taxa-label">taxa global / 100 sessões</div>
            </div>
            <div>
              <div class="ic-top3-title">Top 3 — com tendência</div>
              ${icList.slice(0,3).map(([nome,qtd],i)=>{
                const antQtd=icAntMap[nome]??null;
                return`<div class="ic-top3-item" style="border-left-color:${top3Border(i)};">
                  <span class="ic-top3-rank" style="color:${top3Border(i)};">${i+1}</span>
                  <span class="ic-top3-nome">${nome}</span>
                  <span class="ic-top3-n">${qtd}</span>
                  <span class="ic-top3-trend">${tendHTML(qtd,antQtd)}</span>
                </div>`;
              }).join('')}
            </div>
          </div>
        </div>`
      }
    </div>

    <!-- Detalhe por semana -->
    <div class="section">
      <div class="sec-title">Detalhe por Semana</div>
      <div class="sec-bar"></div>
      <table class="sem-table">
        <thead><tr>
          <th style="text-align:left;">Semana</th>
          <th>Pac.</th><th>HD</th><th>CRRT</th><th>DP</th><th>SLED</th>
          <th>Total ses.</th><th>FAV</th><th>Perm.</th><th>CDL</th><th>Intercorr.</th>
        </tr></thead>
        <tbody>${sems.map(s=>{
          const[y,w]=s.semana.split('-W');
          const ti=s.ic.reduce((a,ic)=>a+ic.qtd,0);
          const ts=Object.values(s.sessoes).reduce((a,b)=>a+b,0);
          return`<tr>
            <td>Sem. ${w}/${y}</td>
            <td>${s.pac||0}</td>
            <td>${s.sessoes.hd||0}</td><td>${s.sessoes.crrt||0}</td>
            <td>${s.sessoes.dp||0}</td><td>${s.sessoes.sled||0}</td>
            <td class="col-total">${ts}</td>
            <td>${s.acessos.fav||0}</td><td>${s.acessos.permcath||0}</td><td>${s.acessos.cdl||0}</td>
            <td>${ti}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;

  // Desenha velocímetros
  requestAnimationFrame(()=>{
    drawGauge('gauge-atual',totSess);
    if(totSessAnt>0) drawGauge('gauge-ant',totSessAnt);
    else{
      const c=document.getElementById('gauge-ant');
      if(c){const ctx=c.getContext('2d');c.width=220;c.height=120;ctx.clearRect(0,0,220,120);ctx.font='13px Arial';ctx.fillStyle='#555';ctx.textAlign='center';ctx.fillText('Sem dados lançados',110,60);}
    }
  });
}

document.addEventListener('DOMContentLoaded',()=>{
  const d=new Date();
  document.getElementById('mes-ref').value=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
});
</script>
</body>
</html>

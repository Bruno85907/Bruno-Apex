<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX — Protótipo Header + Hero v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C4A35A;
  --navy:#1E2D50;
  --teal:#028090;
  --bg:#FAF9F5;
  --sans:'Space Grotesk',sans-serif;
  --serif:'Instrument Serif',Georgia,serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:#141413;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;}

/* ═══ BG SELECTOR (dev only) ═══ */
.bg-selector{
  position:fixed;bottom:20px;right:20px;z-index:999;
  background:rgba(30,45,80,.95);backdrop-filter:blur(12px);
  border-radius:12px;padding:14px 18px;
  display:flex;flex-direction:column;gap:8px;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
}
.bg-selector span{font-size:9px;color:var(--gold);font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.bg-selector button{
  font-size:11px;font-family:var(--sans);color:#fff;background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:8px 14px;
  cursor:pointer;transition:all .2s;text-align:left;
}
.bg-selector button:hover{background:rgba(255,255,255,.15);border-color:var(--gold);}
.bg-selector button.active{background:var(--teal);border-color:var(--teal);}

/* ═══ HEADER ═══ */
.header{
  position:fixed;top:0;left:0;right:0;z-index:900;
  height:64px;display:flex;align-items:center;padding:0 40px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(30,45,80,.06);
  transition:all .4s ease;
}
.header.scrolled{
  height:56px;
  box-shadow:0 2px 20px rgba(0,0,0,.06);
}
.header-logo{
  display:flex;align-items:center;gap:12px;
  text-decoration:none;flex-shrink:0;
}
.header-logo-icon{
  width:36px;height:36px;
}
.header-brand{
  font-size:22px;font-weight:700;letter-spacing:5px;
  color:var(--navy);text-transform:uppercase;line-height:1;
}
.header-spacer{flex:1}
.header-nav{display:flex;align-items:center;gap:28px;}
.header-nav a{
  font-size:11px;font-weight:500;letter-spacing:1.5px;
  text-transform:uppercase;color:#666;text-decoration:none;
  transition:color .3s;position:relative;
}
.header-nav a::after{
  content:'';position:absolute;bottom:-4px;left:0;right:0;
  height:2px;background:var(--gold);transform:scaleX(0);
  transition:transform .3s;
}
.header-nav a:hover{color:var(--navy)}
.header-nav a:hover::after{transform:scaleX(1)}
.header-pro{
  font-size:10px;font-weight:500;color:#666;text-decoration:none;
  border:1px solid #ddd;border-radius:6px;padding:7px 14px;
  transition:all .3s;letter-spacing:.5px;
}
.header-pro:hover{border-color:var(--navy);color:var(--navy)}
.header-cta{
  font-size:11px;font-weight:700;letter-spacing:.5px;
  background:var(--gold);color:var(--navy);
  border:none;border-radius:8px;padding:10px 22px;
  cursor:pointer;transition:all .3s;text-decoration:none;
}
.header-cta:hover{
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(196,163,90,.35);
}
.header-sep{
  width:1px;height:24px;background:rgba(0,0,0,.08);margin:0 4px;
}

/* ═══ HERO ═══ */
.hero{
  position:relative;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* Background image with parallax */
.hero-bg{
  position:absolute;inset:-80px;
  background-position:center center;
  background-size:cover;background-repeat:no-repeat;
  transform:translateZ(0);will-change:transform;
  transition:opacity .8s ease;
}

/* Overlay — glassmorphism feel */
.hero-overlay{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 40%, rgba(10,22,40,.7) 0%, rgba(10,22,40,.9) 100%);
  backdrop-filter:saturate(1.3);
}
/* Accent glow */
.hero-glow{
  position:absolute;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(2,128,144,.2) 0%,transparent 70%);
  top:10%;right:-10%;pointer-events:none;
  animation:glow-drift 10s ease-in-out infinite alternate;
}
.hero-glow-2{
  position:absolute;width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(196,163,90,.12) 0%,transparent 70%);
  bottom:5%;left:-5%;pointer-events:none;
  animation:glow-drift 12s ease-in-out infinite alternate-reverse;
}
@keyframes glow-drift{
  0%{transform:translate(0,0) scale(1);}
  100%{transform:translate(30px,-20px) scale(1.1);}
}

/* Geometric accent lines */
.hero-lines{
  position:absolute;inset:0;pointer-events:none;overflow:hidden;
}
.hero-lines::before{
  content:'';position:absolute;
  width:1px;height:200px;background:linear-gradient(to bottom,transparent,rgba(196,163,90,.2),transparent);
  top:15%;left:12%;transform:rotate(15deg);
  animation:line-fade 6s ease-in-out infinite;
}
.hero-lines::after{
  content:'';position:absolute;
  width:1px;height:160px;background:linear-gradient(to bottom,transparent,rgba(2,128,144,.15),transparent);
  top:25%;right:15%;transform:rotate(-10deg);
  animation:line-fade 8s ease-in-out infinite 2s;
}
@keyframes line-fade{
  0%,100%{opacity:.3;}50%{opacity:.8;}
}

/* Floating cross logo in hero bg */
.hero-cross-bg{
  position:absolute;z-index:1;
  width:350px;height:350px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  opacity:.04;pointer-events:none;
}

/* Content */
.hero-content{
  position:relative;z-index:2;text-align:center;
  max-width:720px;padding:0 30px;
}
.hero-content > *{
  opacity:0;transform:translateY(25px);
  animation:stagger-in .8s ease-out forwards;
}
.hero-content > *:nth-child(1){animation-delay:.2s}
.hero-content > *:nth-child(2){animation-delay:.45s}
.hero-content > *:nth-child(3){animation-delay:.65s}
.hero-content > *:nth-child(4){animation-delay:.85s}
@keyframes stagger-in{
  to{opacity:1;transform:translateY(0);}
}

.hero-eyebrow{
  font-size:12px;font-weight:600;letter-spacing:4px;
  text-transform:uppercase;color:var(--gold);
  margin-bottom:24px;
  display:inline-flex;align-items:center;gap:12px;
}
.hero-eyebrow::before,.hero-eyebrow::after{
  content:'';width:30px;height:1px;background:var(--gold);opacity:.5;
}
.hero-headline{
  font-family:var(--serif);
  font-size:60px;font-weight:400;color:#fff;
  line-height:1.12;margin-bottom:20px;
}
.hero-headline em{font-style:italic;color:var(--gold);}
.hero-sub{
  font-size:17px;font-weight:300;color:rgba(255,255,255,.6);
  line-height:1.65;margin-bottom:40px;max-width:520px;margin-left:auto;margin-right:auto;
  letter-spacing:.2px;
}
.hero-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.hero-btn-primary{
  font-size:14px;font-weight:700;letter-spacing:.5px;
  background:var(--gold);color:var(--navy);
  border:none;border-radius:10px;padding:16px 36px;
  cursor:pointer;transition:all .3s;text-decoration:none;
  display:inline-flex;align-items:center;gap:8px;
}
.hero-btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(196,163,90,.4);
}
.hero-btn-secondary{
  font-size:14px;font-weight:500;
  background:rgba(255,255,255,.06);color:#fff;
  border:1.5px solid rgba(255,255,255,.18);
  border-radius:10px;padding:16px 32px;
  cursor:pointer;transition:all .3s;text-decoration:none;
}
.hero-btn-secondary:hover{
  border-color:rgba(255,255,255,.4);
  background:rgba(255,255,255,.1);
}

/* Scroll indicator */
.hero-scroll{
  position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
  z-index:2;display:flex;flex-direction:column;align-items:center;gap:6px;
  animation:bounce-scroll 2.5s ease-in-out infinite;
}
.hero-scroll span{
  font-size:8px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.3);
}
.scroll-line{
  width:1px;height:28px;
  background:linear-gradient(to bottom,rgba(196,163,90,.5),transparent);
}
@keyframes bounce-scroll{
  0%,100%{transform:translateX(-50%) translateY(0);opacity:.6;}
  50%{transform:translateX(-50%) translateY(8px);opacity:1;}
}

/* Placeholder sections */
.placeholder-section{
  min-height:50vh;padding:80px 40px;
  display:flex;align-items:center;justify-content:center;
}
.placeholder-section h2{
  font-family:var(--serif);font-size:36px;color:var(--navy);opacity:.25;
}
.rv{opacity:0;transform:translateY(24px);transition:all .7s cubic-bezier(.22,1,.36,1);}
.rv.in{opacity:1;transform:translateY(0);}
</style>
</head>
